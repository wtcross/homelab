---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: compact-node-pools
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    has-git-repo-objects: "true"
spec:
  destination:
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://github.com/wtcross/homelab
      targetRevision: HEAD
      path: openshift-gitops/clusters/core.lab.cross.solutions/cluster-config/compact-node-pools/
  project: local-cluster
  syncPolicy:
    automated:
      prune: false
      allowEmpty: true
      selfHeal: true
