---
global:
  enabled: true
  openshift: true
  namespace: vault
server:
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: truenas-nfs-nonroot
    mountPath: /vault/data
    accessMode: ReadWriteOnce
  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: truenas-nfs-nonroot
    mountPath: /vault/audit
    accessMode: ReadWriteOnce
  route:
    enabled: true
    host: vault.apps.core.lab.cross.solutions
    tls:
      termination: edge
  standalone:
    enabled: false
  ha:
    enabled: true
    replicas: 3
    config: |
      storage "consul" {
        address = "helm-consul-consul-server:8500"
        path    = "vault/"
      }
      listener "tcp" {
        address     = "0.0.0.0:8200"
        tls_disable = 1
      }
      ui = true
  extraEnvironmentVars:
    VAULT_API_ADDR: "http://$(POD_IP):8200"
    VAULT_CLUSTER_ADDR: "http://$(POD_IP):8201"
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"
    port: 8200
  serviceAccount:
    create: true
    name: vault
  statefulSet:
    annotations:
      vault.hashicorp.com/service-selector: "vault-active=true"
injector:
  enabled: false
ui:
  enabled: true
csi:
  enabled: true
