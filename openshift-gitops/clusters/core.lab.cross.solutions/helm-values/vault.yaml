---
global:
  openshift: true
  namespace: vault
  enabled: true
server:
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: truenas-nfs-nonroot
    mountPath: /vault/data
    accessMode: ReadWriteOnce
  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: truenas-nfs-nonroot
    mountPath: /vault/audit
    accessMode: ReadWriteOnce
  route:
    enabled: true
    host: vault.apps.core.lab.cross.solutions
  standalone:
    enabled: false
  ha:
    enabled: true
    raft:
      enabled: true
    replicas: 3
    config: |
      storage "consul" {
        address = "consul-server:8500"
        path    = "vault/"
      }
      listener "tcp" {
        address     = "[::]:8200"
        tls_disable = 1
      }
injector:
  enabled: true
ui:
  enabled: true
csi:
  enabled: true
