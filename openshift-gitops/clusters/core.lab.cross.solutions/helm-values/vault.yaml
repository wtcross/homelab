---
global:
  openshift: true
  namespace: vault
  enabled: true
server:
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: truenas-nfs-nonroot
    mountPath: /vault/data
    accessMode: ReadWriteOnce
  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: truenas-nfs-nonroot
    mountPath: /vault/audit
    accessMode: ReadWriteOnce
  route:
    enabled: true
    host: vault.apps.core.lab.cross.solutions
  standalone:
    enabled: false
  ha:
    enabled: true
    raft:
      enabled: true
    replicas: 3
ui:
  enabled: true
csi:
  enabled: true
