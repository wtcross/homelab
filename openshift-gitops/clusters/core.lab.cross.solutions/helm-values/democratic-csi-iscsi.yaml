---
csiDriver:
  name: "org.democratic-csi.iscsi"

storageClasses:
  - name: truenas-iscsi-nonroot
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    storageClassAnnotations:
      description: "iSCSI with mutual CHAP"
    parameters:
      # for block-based storage can be ext3, ext4, xfs
      # for nfs should be nfs
      fsType: ext4

      # if true, volumes created from other snapshots will be
      # zfs send/received instead of zfs cloned
      # detachedVolumesFromSnapshots: "false"

      # if true, volumes created from other volumes will be
      # zfs send/received instead of zfs cloned
      # detachedVolumesFromVolumes: "false"

    secrets:
      provisioner-secret-name: truenas-iscsi-chap
      provisioner-secret-namespace: democratic-csi
      controller-publish-secret-name: truenas-iscsi-chap
      controller-publish-secret-namespace: democratic-csi
      node-stage-secret-name: truenas-iscsi-chap
      node-stage-secret-namespace: democratic-csi
      node-publish-secret-name: truenas-iscsi-chap
      node-publish-secret-namespace: democratic-csi
      controller-expand-secret-name: truenas-iscsi-chap
      controller-expand-secret-namespace: democratic-csi

# if your cluster supports snapshots you may enable below
volumeSnapshotClasses:
  - name: truenas-iscsi-nonroot
    parameters:
    # if true, snapshots will be created with zfs send/receive
    # detachedSnapshots: "false"
    secrets:
      snapshotter-secret-name: truenas-iscsi-chap
      snapshotter-secret-namespace: democratic-csi

node:
  rbac:
    openshift:
      privileged: true
  driver:
    enabled: true
    localtimeHostPath: false
    image: ghcr.io/democratic-csi/democratic-csi:latest
  podAnnotations:
    k8s.v1.cni.cncf.io/networks: democratic-csi/lab-storage

controller:
  rbac:
    openshift:
      privileged: true
  driver:
    enabled: true
    image: ghcr.io/democratic-csi/democratic-csi:latest
  podAnnotations:
    k8s.v1.cni.cncf.io/networks: democratic-csi/lab-storage

driver:
  existingConfigSecret: freenas-iscsi-driver-config
  config:
    driver: freenas-iscsi
