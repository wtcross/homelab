---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - git-config-map.yaml
  - 01-cluster-version.yaml
  - 02-machineconfigs.yaml
  - 03-aggregate-nmstate.yaml
  - 03-aggregate-node-feature-discovery.yaml
  - 04-storage-network.yaml
  - 05-helm-democratic-csi.yaml
  - 06-helm-consul.yaml
  - 07-helm-vault.yaml
  - 08-operator-eso.yaml
  - 09-instance-eso.yaml
#  - 10-aggregate-openshift-virtualization.yaml
#  - 20-aggregate-openshift-dev-spaces.yaml
#  - 30-operator-ansible-automation-platform.yaml

replacements:
  - source:
      kind: ConfigMap
      name: git-config
      fieldPath: data.repoBase
    targets:
      - select:
          kind: Application
          group: argoproj.io
          labelSelector: has-git-repo-objects=true
        fieldPaths:
        - spec.sources.*.repoURL
